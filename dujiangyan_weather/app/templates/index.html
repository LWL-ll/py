<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>都江堰天气数据分析平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-value { font-size: 2rem; font-weight: 700; color: #0d6efd; }
        .stat-label { color: #6c757d; font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">🌤️ 都江堰天气数据分析平台</a>
        </div>
    </nav>

    <div class="container py-4">
        <!-- 概览卡片 -->
        <div class="row g-3 mb-4" id="summary-cards">
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <div class="stat-value" id="total-days">-</div>
                    <div class="stat-label">总记录天数</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <div class="stat-value" id="avg-max">-</div>
                    <div class="stat-label">平均最高温 (℃)</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <div class="stat-value" id="avg-min">-</div>
                    <div class="stat-label">平均最低温 (℃)</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <div class="stat-value" id="date-range">-</div>
                    <div class="stat-label">数据时间范围</div>
                </div>
            </div>
        </div>

        <!-- 图表区 -->
        <div class="row g-3 mb-4">
            <div class="col-lg-8">
                <div class="card p-3">
                    <h5 class="card-title">月度温度趋势</h5>
                    <canvas id="tempChart" height="120"></canvas>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card p-3">
                    <h5 class="card-title">降雨天数分布</h5>
                    <canvas id="rainChart" height="180"></canvas>
                </div>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="card p-3">
            <h5 class="card-title mb-3">天气数据列表</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>日期</th>
                            <th>最高温</th>
                            <th>最低温</th>
                            <th>天气状况</th>
                            <th>风向</th>
                            <th>风力</th>
                        </tr>
                    </thead>
                    <tbody id="weather-table-body">
                    </tbody>
                </table>
            </div>
            <nav>
                <ul class="pagination justify-content-center" id="pagination">
                </ul>
            </nav>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const pageSize = 20;

        async function loadSummary() {
            const res = await fetch('/api/weather/summary/');
            const json = await res.json();
            const d = json.data;
            document.getElementById('total-days').textContent = d.total_days;
            document.getElementById('avg-max').textContent = d.avg_max_temp ?? '-';
            document.getElementById('avg-min').textContent = d.avg_min_temp ?? '-';
            document.getElementById('date-range').textContent = d.date_range;
        }

        async function loadTable(page = 1) {
            currentPage = page;
            const res = await fetch(`/api/weather/list/?page=${page}&page_size=${pageSize}`);
            const json = await res.json();
            const tbody = document.getElementById('weather-table-body');
            tbody.innerHTML = '';
            json.data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.date}</td>
                    <td>${row.max_temp ?? '-'} ℃</td>
                    <td>${row.min_temp ?? '-'} ℃</td>
                    <td>${row.weather_desc || '-'}</td>
                    <td>${row.wind_direction || '-'}</td>
                    <td>${row.wind_level || '-'}</td>
                `;
                tbody.appendChild(tr);
            });
            renderPagination(json.total, json.page_size, json.page);
        }

        function renderPagination(total, pageSize, page) {
            const totalPages = Math.ceil(total / pageSize);
            const ul = document.getElementById('pagination');
            ul.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const li = document.createElement('li');
                li.className = `page-item ${i === page ? 'active' : ''}`;
                li.innerHTML = `<a class="page-link" href="#" onclick="loadTable(${i}); return false;">${i}</a>`;
                ul.appendChild(li);
            }
        }

        async function loadCharts() {
            const res = await fetch('/api/weather/monthly/');
            const json = await res.json();
            const data = json.data;
            const labels = data.map(d => `${d.year}-${String(d.month).padStart(2,'0')}`);
            const avgMax = data.map(d => d.avg_max_temp);
            const avgMin = data.map(d => d.avg_min_temp);
            const rainy = data.map(d => d.rainy_days);

            new Chart(document.getElementById('tempChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '月均最高温', data: avgMax, borderColor: '#ff6384', tension: 0.3 },
                        { label: '月均最低温', data: avgMin, borderColor: '#36a2eb', tension: 0.3 }
                    ]
                },
                options: { responsive: true, interaction: { mode: 'index', intersect: false } }
            });

            new Chart(document.getElementById('rainChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ label: '降雨天数', data: rainy, backgroundColor: '#4bc0c0' }]
                },
                options: { responsive: true }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadSummary();
            loadTable(1);
            loadCharts();
        });
    </script>
</body>
</html>
