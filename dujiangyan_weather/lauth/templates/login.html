<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 都江堰天气</title>
{% load static %}
<link href="{% static "css/auth.css" %}?v=2" rel="stylesheet">
</head>
<body>

<div id="login-page">
  <!-- 左侧面板：柔光蓝 + 动画角色 -->
  <div class="left-panel">
    <div class="characters-wrapper">
      <div class="characters-scene" id="characters-scene">
        <!-- 紫色角色 -->
        <div class="character char-purple" id="char-purple">
          <div class="eyes" id="purple-eyes" style="left:45px;top:40px;gap:28px;">
            <div class="eyeball" id="purple-eye-l" style="width:18px;height:18px;">
              <div class="pupil" id="purple-pupil-l" style="width:7px;height:7px;"></div>
            </div>
            <div class="eyeball" id="purple-eye-r" style="width:18px;height:18px;">
              <div class="pupil" id="purple-pupil-r" style="width:7px;height:7px;"></div>
            </div>
          </div>
        </div>
        <!-- 黑色角色 -->
        <div class="character char-black" id="char-black">
          <div class="eyes" id="black-eyes" style="left:26px;top:32px;gap:20px;">
            <div class="eyeball" id="black-eye-l" style="width:16px;height:16px;">
              <div class="pupil" id="black-pupil-l" style="width:6px;height:6px;"></div>
            </div>
            <div class="eyeball" id="black-eye-r" style="width:16px;height:16px;">
              <div class="pupil" id="black-pupil-r" style="width:6px;height:6px;"></div>
            </div>
          </div>
        </div>
        <!-- 橙色角色 -->
        <div class="character char-orange" id="char-orange">
          <div class="eyes" id="orange-eyes" style="left:82px;top:90px;gap:28px;">
            <div class="bare-pupil" id="orange-pupil-l"></div>
            <div class="bare-pupil" id="orange-pupil-r"></div>
          </div>
          <div class="orange-mouth" id="orange-mouth" style="left:90px;top:120px;"></div>
        </div>
        <!-- 黄色角色 -->
        <div class="character char-yellow" id="char-yellow">
          <div class="eyes" id="yellow-eyes" style="left:52px;top:40px;gap:20px;">
            <div class="bare-pupil" id="yellow-pupil-l"></div>
            <div class="bare-pupil" id="yellow-pupil-r"></div>
          </div>
          <div class="yellow-mouth" id="yellow-mouth" style="left:40px;top:88px;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 右侧面板：柔光卡片 + 登录表单 -->
  <div class="right-panel">
    <div class="form-card">
      <div class="sparkle-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L13.5 9H10.5L12 2Z" fill="#4A6FA5"/>
          <path d="M12 22L10.5 15H13.5L12 22Z" fill="#4A6FA5"/>
          <path d="M2 12L9 10.5V13.5L2 12Z" fill="#4A6FA5"/>
          <path d="M22 12L15 13.5V10.5L22 12Z" fill="#4A6FA5"/>
        </svg>
      </div>
      <div class="form-header">
        <h1>欢迎回来</h1>
        <p>请输入您的账号信息</p>
      </div>

      <form id="login-form" onsubmit="return false;">
        {% csrf_token %}
        <div class="form-group">
          <label id="email-label" for="email">邮箱</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="请输入邮箱地址" autocomplete="off" />
          </div>
        </div>

        <div class="form-group">
          <label id="password-label" for="password">密码</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="请输入密码" />
            <button type="button" class="toggle-password" id="toggle-password">
              <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="eye-off-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember-me" /> 记住我（30天）
          </label>
          <a class="forgot-link" href="/lauth/forgot-password/">忘记密码？</a>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <button type="submit" class="btn-login" id="btn-login">
          <span class="btn-text">登录</span>
          <div class="btn-hover-content">
            <span>登录</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
        </button>
      </form>

      <div class="signup-link">
        还没有账号？<a href="/lauth/register">立即注册</a>
      </div>
    </div>
  </div>
</div>

<script src="{% static "js/auth-common.js" %}?v=2"></script>
<script>
(function() {
  var emailInput = document.getElementById('email');
  var passwordInput = document.getElementById('password');
  var toggleBtn = document.getElementById('toggle-password');
  var eyeIcon = document.getElementById('eye-icon');
  var eyeOffIcon = document.getElementById('eye-off-icon');

  /* 初始化角色动画 */
  AuthCharacters.init({
    passwordInput: passwordInput,
    toggleBtn: toggleBtn,
    eyeIcon: eyeIcon,
    eyeOffIcon: eyeOffIcon,
    formFields: [
      { el: emailInput,    isPassword: false },
      { el: passwordInput, isPassword: true  }
    ]
  });

  /* 记住我：从 localStorage 恢复 */
  var savedEmail = localStorage.getItem('lauth_email');
  if (savedEmail && localStorage.getItem('lauth_remember') === 'true') {
    emailInput.value = savedEmail;
    document.getElementById('remember-me').checked = true;
  }

  /* 登录提交 */
  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var email = emailInput.value.trim();
    var pwd = passwordInput.value;
    var emailLabel = document.getElementById('email-label');
    var pwdLabel = document.getElementById('password-label');

    AuthCharacters.hideMsg();
    emailInput.classList.remove('error'); emailLabel.classList.remove('error-label');
    passwordInput.classList.remove('error'); pwdLabel.classList.remove('error-label');

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailInput.classList.add('error'); emailLabel.classList.add('error-label');
      AuthCharacters.showMsg('error', '请输入有效的邮箱地址');
      AuthCharacters.triggerError(); return;
    }
    if (!pwd || pwd.length < 6) {
      passwordInput.classList.add('error'); pwdLabel.classList.add('error-label');
      AuthCharacters.showMsg('error', '密码至少需要6个字符');
      AuthCharacters.triggerError(); return;
    }

    var remember = document.getElementById('remember-me').checked;
    localStorage.setItem('lauth_email', remember ? email : '');
    localStorage.setItem('lauth_remember', remember ? 'true' : 'false');

    var btn = document.getElementById('btn-login');
    btn.querySelector('.btn-text').textContent = '登录中...';
    btn.disabled = true;

    fetch('/lauth/user-login/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify({ email: email, password: pwd })
    })
    .then(function(r) { return r.ok ? r.json() : Promise.reject(r); })
    .then(function(data) {
      if (data.success) {
        btn.querySelector('.btn-text').textContent = '登录成功！';
        setTimeout(function() {
          var p = new URLSearchParams(window.location.search);
          window.location.href = p.get('next') || '/';
        }, 500);
      } else {
        btn.querySelector('.btn-text').textContent = '登录';
        btn.disabled = false;
        AuthCharacters.showMsg('error', data.message || '邮箱或密码错误');
        passwordInput.classList.add('error'); pwdLabel.classList.add('error-label');
        AuthCharacters.triggerError();
      }
    })
    .catch(function() {
      btn.querySelector('.btn-text').textContent = '登录';
      btn.disabled = false;
      AuthCharacters.showMsg('error', '网络错误，请检查网络连接后重试');
      AuthCharacters.triggerError();
    });
  });
})();
</script>
</body>
</html>
