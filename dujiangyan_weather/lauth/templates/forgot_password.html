<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忘记密码 - 都江堰天气</title>
{% load static %}
<link href="{% static "css/auth.css" %}?v=2" rel="stylesheet">
<style>
  /* 忘记密码页专属：步骤指示器 */
  .step-indicator {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    margin-bottom: 28px;
  }
  .step-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    transition: all 0.3s;
  }
  .step-line {
    width: 40px; height: 2px;
    background: #e0e0e0;
    transition: background 0.3s;
  }
  .step-dot.active {
    background: #4A6FA5; color: #fff;
  }
  .step-dot.done {
    background: #4caf50; color: #fff;
  }
  .step-dot.pending {
    background: #e0e0e0; color: #999;
  }
  .step-line.done {
    background: #4caf50;
  }
  .step-labels {
    display: flex;
    justify-content: center;
    gap: 50px;
    margin-bottom: 24px;
    font-size: 12px;
    color: #999;
  }
  .step-labels span.active { color: #4A6FA5; font-weight: 600; }
  .step-labels span.done { color: #4caf50; }

  /* 发送验证码按钮 */
  .btn-get-code {
    height: 48px;
    padding: 0 16px;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    background: #ffffff;
    color: #4A6FA5;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-get-code:hover:not(:disabled) {
    border-color: #4A6FA5;
    background: #FAFAF8;
  }
  .btn-get-code:disabled {
    color: #bdbdbd;
    cursor: not-allowed;
    border-color: #eeeeee;
    background: #fafafa;
  }

  /* 步骤面板切换 */
  .step-panel { display: none; }
  .step-panel.show { display: block; }

  /* 返回登录链接 */
  .back-link {
    text-align: center;
    margin-top: 20px;
  }
  .back-link a {
    font-size: 13px;
    color: #90a4ae;
    text-decoration: none;
  }
  .back-link a:hover { color: #4A6FA5; }
</style>
</head>
<body>

<div id="login-page">
  <!-- 左侧面板 -->
  <div class="left-panel">
    <div class="characters-wrapper">
      <div class="characters-scene" id="characters-scene">
        <div class="character char-purple" id="char-purple">
          <div class="eyes" id="purple-eyes" style="left:45px;top:40px;gap:28px;">
            <div class="eyeball" id="purple-eye-l" style="width:18px;height:18px;">
              <div class="pupil" id="purple-pupil-l" style="width:7px;height:7px;"></div>
            </div>
            <div class="eyeball" id="purple-eye-r" style="width:18px;height:18px;">
              <div class="pupil" id="purple-pupil-r" style="width:7px;height:7px;"></div>
            </div>
          </div>
        </div>
        <div class="character char-black" id="char-black">
          <div class="eyes" id="black-eyes" style="left:26px;top:32px;gap:20px;">
            <div class="eyeball" id="black-eye-l" style="width:16px;height:16px;">
              <div class="pupil" id="black-pupil-l" style="width:6px;height:6px;"></div>
            </div>
            <div class="eyeball" id="black-eye-r" style="width:16px;height:16px;">
              <div class="pupil" id="black-pupil-r" style="width:6px;height:6px;"></div>
            </div>
          </div>
        </div>
        <div class="character char-orange" id="char-orange">
          <div class="eyes" id="orange-eyes" style="left:82px;top:90px;gap:28px;">
            <div class="bare-pupil" id="orange-pupil-l"></div>
            <div class="bare-pupil" id="orange-pupil-r"></div>
          </div>
          <div class="orange-mouth" id="orange-mouth" style="left:90px;top:120px;"></div>
        </div>
        <div class="character char-yellow" id="char-yellow">
          <div class="eyes" id="yellow-eyes" style="left:52px;top:40px;gap:20px;">
            <div class="bare-pupil" id="yellow-pupil-l"></div>
            <div class="bare-pupil" id="yellow-pupil-r"></div>
          </div>
          <div class="yellow-mouth" id="yellow-mouth" style="left:40px;top:88px;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 右侧面板 -->
  <div class="right-panel">
    <div class="form-card">
      <div class="sparkle-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L13.5 9H10.5L12 2Z" fill="#4A6FA5"/>
          <path d="M12 22L10.5 15H13.5L12 22Z" fill="#4A6FA5"/>
          <path d="M2 12L9 10.5V13.5L2 12Z" fill="#4A6FA5"/>
          <path d="M22 12L15 13.5V10.5L22 12Z" fill="#4A6FA5"/>
        </svg>
      </div>
      <div class="form-header">
        <h1>忘记密码</h1>
        <p id="step-desc">请输入您注册时使用的邮箱</p>
      </div>

      <!-- 步骤指示器 -->
      <div class="step-indicator">
        <div class="step-dot active" id="dot1">1</div>
        <div class="step-line" id="line"></div>
        <div class="step-dot pending" id="dot2">2</div>
      </div>
      <div class="step-labels">
        <span class="active" id="label1">验证身份</span>
        <span id="label2">重置密码</span>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <!-- 步骤 1：输入邮箱获取验证码 -->
      <div class="step-panel show" id="panel1">
        <form id="step1-form" onsubmit="return false;">
          {% csrf_token %}
          <div class="form-group">
            <label id="email-label" for="email">注册邮箱</label>
            <div class="input-wrapper" style="display: flex; gap: 10px;">
              <input type="email" id="email" placeholder="请输入注册时使用的邮箱" autocomplete="off" style="flex: 1;" />
              <button type="button" id="btn-send-code" class="btn-get-code">发送验证码</button>
            </div>
          </div>

          <div class="form-group">
            <label id="code-label" for="verification-code">验证码</label>
            <div class="input-wrapper">
              <input type="text" id="verification-code" placeholder="请输入6位验证码" maxlength="6" autocomplete="off" />
            </div>
          </div>

          <button type="submit" class="btn-login" id="btn-next">
            <span class="btn-text">下一步</span>
          </button>
        </form>
      </div>

      <!-- 步骤 2：设置新密码 -->
      <div class="step-panel" id="panel2">
        <form id="step2-form" onsubmit="return false;">
          {% csrf_token %}
          <div class="form-group">
            <label id="new-pwd-label" for="new-password">新密码</label>
            <div class="input-wrapper">
              <input type="password" id="new-password" placeholder="请输入新密码（至少6个字符）" />
              <button type="button" class="toggle-password" id="toggle-password">
                <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg id="eye-off-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label id="confirm-pwd-label" for="confirm-password">确认新密码</label>
            <div class="input-wrapper">
              <input type="password" id="confirm-password" placeholder="请再次输入新密码" />
            </div>
          </div>

          <button type="submit" class="btn-login" id="btn-reset">
            <span class="btn-text">重置密码</span>
          </button>
        </form>
      </div>

      <div class="back-link">
        <a href="/lauth/login">← 返回登录</a>
      </div>
    </div>
  </div>
</div>

<script src="{% static "js/auth-common.js" %}?v=2"></script>
<script>
(function() {
  var emailInput = document.getElementById('email');
  var codeInput  = document.getElementById('verification-code');
  var newPwdInput = document.getElementById('new-password');
  var confirmInput = document.getElementById('confirm-password');

  var isCodeSent  = false;
  var countdownTimer = null;
  var verifiedCode = '';   // 已验证通过的验证码
  var verifiedEmail = '';  // 已验证通过的邮箱

  /* 初始化角色动画 */
  AuthCharacters.init({
    passwordInput: newPwdInput,
    toggleBtn: document.getElementById('toggle-password'),
    eyeIcon: document.getElementById('eye-icon'),
    eyeOffIcon: document.getElementById('eye-off-icon'),
    formFields: [
      { el: emailInput,   isPassword: false },
      { el: newPwdInput,  isPassword: true  },
      { el: confirmInput, isPassword: true  }
    ]
  });

  /* 确认密码输入触发动画 */
  confirmInput.addEventListener('input', function() { AuthCharacters.update(); });

  /* ========== 发送验证码 ========== */
  document.getElementById('btn-send-code').addEventListener('click', function() {
    var email = emailInput.value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailInput.classList.add('error');
      document.getElementById('email-label').classList.add('error-label');
      AuthCharacters.showMsg('error', '请先输入有效的邮箱地址');
      AuthCharacters.triggerError();
      return;
    }

    var btn = document.getElementById('btn-send-code');
    if (btn.disabled) return;

    btn.disabled = true;
    btn.textContent = '发送中...';

    fetch('/lauth/send-reset-code/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify({ email: email })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        isCodeSent = true;
        AuthCharacters.hideMsg();
        AuthCharacters.showMsg('success', '验证码已发送，5分钟内有效，请查收邮件');
        startCountdown(btn);
      } else {
        btn.disabled = false;
        btn.textContent = '发送验证码';
        AuthCharacters.showMsg('error', data.message || '发送失败');
        AuthCharacters.triggerError();
      }
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = '发送验证码';
      AuthCharacters.showMsg('error', '网络错误，请稍后重试');
      AuthCharacters.triggerError();
    });
  });

  function startCountdown(btn) {
    var seconds = 60;
    btn.textContent = seconds + 's';
    countdownTimer = setInterval(function() {
      seconds--;
      btn.textContent = seconds + 's';
      if (seconds <= 0) {
        clearInterval(countdownTimer);
        btn.disabled = false;
        btn.textContent = '重新发送';
      }
    }, 1000);
  }

  /* ========== 步骤 1 → 步骤 2 ========== */
  document.getElementById('step1-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var email = emailInput.value.trim();
    var code  = codeInput.value.trim();

    AuthCharacters.hideMsg();
    emailInput.classList.remove('error');
    codeInput.classList.remove('error');
    document.getElementById('email-label').classList.remove('error-label');
    document.getElementById('code-label').classList.remove('error-label');

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailInput.classList.add('error');
      document.getElementById('email-label').classList.add('error-label');
      AuthCharacters.showMsg('error', '请输入有效的邮箱地址');
      AuthCharacters.triggerError(); return;
    }
    if (!code || code.length !== 6) {
      codeInput.classList.add('error');
      document.getElementById('code-label').classList.add('error-label');
      AuthCharacters.showMsg('error', '请输入6位验证码');
      AuthCharacters.triggerError(); return;
    }

    /* 验证验证码 */
    fetch('/lauth/verify-code/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify({ email: email, code: code })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        verifiedCode = code;
        verifiedEmail = email;
        goToStep2();
      } else {
        AuthCharacters.showMsg('error', data.message || '验证码无效');
        AuthCharacters.triggerError();
      }
    })
    .catch(function() {
      AuthCharacters.showMsg('error', '网络错误，请稍后重试');
      AuthCharacters.triggerError();
    });
  });

  function goToStep2() {
    document.getElementById('panel1').classList.remove('show');
    document.getElementById('panel2').classList.add('show');
    document.getElementById('dot1').className = 'step-dot done';
    document.getElementById('line').className = 'step-line done';
    document.getElementById('dot2').className = 'step-dot active';
    document.getElementById('label1').className = 'done';
    document.getElementById('label2').className = 'active';
    document.getElementById('step-desc').textContent = '请设置您的新密码';
    AuthCharacters.hideMsg();
  }

  /* ========== 步骤 2：重置密码 ========== */
  document.getElementById('step2-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var pwd    = newPwdInput.value;
    var confirm = confirmInput.value;

    AuthCharacters.hideMsg();
    newPwdInput.classList.remove('error');
    confirmInput.classList.remove('error');
    document.getElementById('new-pwd-label').classList.remove('error-label');
    document.getElementById('confirm-pwd-label').classList.remove('error-label');

    if (!pwd || pwd.length < 6) {
      newPwdInput.classList.add('error');
      document.getElementById('new-pwd-label').classList.add('error-label');
      AuthCharacters.showMsg('error', '新密码至少需要6个字符');
      AuthCharacters.triggerError(); return;
    }
    if (pwd !== confirm) {
      confirmInput.classList.add('error');
      document.getElementById('confirm-pwd-label').classList.add('error-label');
      AuthCharacters.showMsg('error', '两次输入的密码不一致');
      AuthCharacters.triggerError(); return;
    }

    var btn = document.getElementById('btn-reset');
    btn.querySelector('.btn-text').textContent = '重置中...';
    btn.disabled = true;

    fetch('/lauth/reset-password/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify({ email: verifiedEmail, code: verifiedCode, new_password: pwd })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        AuthCharacters.showMsg('success', '密码重置成功！即将跳转到登录页...');
        btn.querySelector('.btn-text').textContent = '重置成功！';
        setTimeout(function() { var p=new URLSearchParams(window.location.search); window.location.href='/lauth/login/'+(p.get('next')?'?next='+encodeURIComponent(p.get('next')):''); }, 1500);
      } else {
        btn.querySelector('.btn-text').textContent = '重置密码';
        btn.disabled = false;
        AuthCharacters.showMsg('error', data.message || '重置失败');
        AuthCharacters.triggerError();
      }
    })
    .catch(function() {
      btn.querySelector('.btn-text').textContent = '重置密码';
      btn.disabled = false;
      AuthCharacters.showMsg('error', '网络错误，请稍后重试');
      AuthCharacters.triggerError();
    });
  });
})();
</script>
</body>
</html>
